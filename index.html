<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID</title>

<style>

/* ==== BACKGROUND ==== */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: white;
    text-align: center;
    overflow-x: hidden;
}

/* moving stars */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, #5a00ff 1px, transparent 1px);
    background-size: 12px 12px;
    animation: drift 80s linear infinite;
    top: -50%;
    left: -50%;
    opacity: 0.25;
}

@keyframes drift {
    from { transform: translate(0,0); }
    to { transform: translate(-300px,-300px); }
}

/* ==== TITLE ==== */
h1 {
    font-size: 70px;
    font-weight: bold;
    margin-top: 40px;
    animation: glitch 0.5s infinite;
}

@keyframes glitch {
    0% { transform: translate(0); }
    20% { transform: translate(-3px,3px); }
    40% { transform: translate(3px,-3px); }
    60% { transform: translate(-3px,-3px); }
    80% { transform: translate(3px,3px); }
    100% { transform: translate(0); }
}

/* ==== VOID ==== */
.void {
    width: 220px;
    height: 220px;
    margin: 30px auto;
    border-radius: 50%;
    background: radial-gradient(circle, #000 30%, #2a0055 60%, #6a00ff 100%);
    box-shadow: 
        0 0 100px #6a00ff,
        0 0 50px #3b0a6b inset;
    animation: spin 25s linear infinite, pulse 3s ease-in-out infinite;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
}

/* ==== TEXT ==== */
p {
    opacity: 0.85;
}

/* ==== CARD ==== */
.card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 12px;
    max-width: 400px;
    margin: 20px auto;
    text-align: left;
}

/* ==== BUTTON ==== */
.btn {
    display: inline-block;
    padding: 12px 20px;
    background: #6a00ff;
    color: white;
    border-radius: 8px;
    text-decoration: none;
    margin-top: 10px;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #8a2bff;
}

/* ==== TIMER ==== */
.timer {
    font-size: 28px;
    margin: 15px 0;
}

/* ==== FEED ==== */
.feed {
    font-size: 14px;
    margin-top: 10px;
}

.feed div {
    margin-bottom: 5px;
    opacity: 0;
    animation: fade 0.6s forwards;
}

@keyframes fade {
    to { opacity: 1; }
}

/* ==== X BUTTON ==== */
#x {
    position: fixed;
    top: 10px;
    left: 10px;
    background: #2a0055;
    padding: 6px 10px;
    border-radius: 6px;
    text-decoration: none;
    color: white;
}

</style>
</head>

<body>

<a href="https://x.com/YOUR_HANDLE" id="x">X</a>

<h1>VOID</h1>

<div class="void"></div>

<p>
You were never early.<br>
You were never late.<br>
You were always exit liquidity.
</p>

<div class="card">
    <h2>Presale Live</h2>
    <div class="timer" id="countdown"></div>

    <p><strong>Send SOL to enter:</strong></p>
    <p id="wallet"></p>

    <a class="btn" onclick="copyWallet()">Copy Address</a>

    <p>
    Minimum: 1.65 SOL<br>
    Maximum: 20 SOL
    </p>
</div>

<div class="card">
    <h3>Token Info</h3>
    <p>
    Price: 0.5 SOL<br>
    Supply: 10,000<br>
    Allocation: 50% Presale / 30% Liquidity / 20% Team
    </p>
</div>

<div class="card">
    <h3>Tracking</h3>
    <p>Wallets: <span id="buyers">0</span></p>
    <p>Raised: <span id="raised">0</span> SOL</p>
    <div class="feed" id="feed"></div>
</div>

<script>

/* WALLET */
const WALLET_ADDRESS = "EjV7pQ7oHzDep1D2WhgZ8KJpuHxahtTMKHnwYaa9L6T6";

document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("wallet").innerText = WALLET_ADDRESS;
});

/* COPY */
function copyWallet() {
    navigator.clipboard.writeText(WALLET_ADDRESS);
    alert("Copied");
}

/* COUNTDOWN */
const end = new Date().getTime() + (3*24*60*60*1000);

setInterval(() => {
    const now = new Date().getTime();
    const d = end - now;

    const days = Math.floor(d/(1000*60*60*24));
    const hours = Math.floor((d%(1000*60*60*24))/(1000*60*60));
    const minutes = Math.floor((d%(1000*60*60))/(1000*60));
    const seconds = Math.floor((d%(1000*60))/1000);

    document.getElementById("countdown").innerHTML =
        days+"d "+hours+"h "+minutes+"m "+seconds+"s";

},1000);

/* TRACKING */
let buyers = 0;
let raised = 0;

function randWallet(){
    const chars="ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz123456789";
    let r="";
    for(let i=0;i<32;i++){r+=chars[Math.floor(Math.random()*chars.length)];}
    return r;
}

function randAmount(){
    return (Math.random()*(20-1.65)+1.65).toFixed(2);
}

function addEntry(){
    const amt=parseFloat(randAmount());
    buyers++;
    raised+=amt;

    document.getElementById("buyers").innerText=buyers;
    document.getElementById("raised").innerText=raised.toFixed(2);

    const div=document.createElement("div");
    div.innerText=`${randWallet()} entered ${amt} SOL`;

    const feed=document.getElementById("feed");
    feed.prepend(div);

    if(feed.children.length>8){
        feed.removeChild(feed.lastChild);
    }
}

function loop(){
    const delay=Math.random()*15000+10000;
    setTimeout(()=>{addEntry();loop();},delay);
}
loop();

</script>

</body>
</html>
